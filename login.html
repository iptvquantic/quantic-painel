<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantic Premium — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-glow: rgba(0,255,136,0.15);
    --green-border: rgba(0,255,136,0.3);
    --bg: #080c0e;
    --bg2: #0d1214;
    --bg3: #111a1d;
    --text: #e8f0ec;
    --text-dim: #7a9088;
    --red: #ff3d5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Corner glow */
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-block {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px; height: 64px;
    border: 1.5px solid var(--green-border);
    border-radius: 16px;
    margin-bottom: 16px;
    background: var(--green-glow);
    box-shadow: 0 0 30px rgba(0,255,136,0.1);
    animation: pulse 3s ease infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,255,136,0.1); }
    50%      { box-shadow: 0 0 50px rgba(0,255,136,0.2); }
  }

  .logo-icon svg { width: 32px; height: 32px; }

  .logo-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid rgba(0,255,136,0.12);
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.4;
  }

  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 28px;
    color: var(--text);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
  }

  input::placeholder { color: rgba(122,144,136,0.5); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #050a07;
    border: none;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  .btn-login:hover {
    background: #00ffaa;
    box-shadow: 0 0 30px rgba(0,255,136,0.4);
    transform: translateY(-1px);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    background: rgba(255,61,90,0.1);
    border: 1px solid rgba(255,61,90,0.3);
    color: var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 6L24 16L8 26V6Z" fill="#00ff88" opacity="0.9"/>
        <path d="M8 6L24 16L8 26V6Z" fill="none" stroke="#00ff88" stroke-width="1.5"/>
        <circle cx="24" cy="16" r="3" fill="#00ff88" opacity="0.5"/>
      </svg>
    </div>
    <div class="logo-name">QUANTIC PREMIUM</div>
    <div class="logo-sub">Painel de Gerenciamento</div>
  </div>

  <div class="card">
    <div class="card-title">Acesso ao Sistema</div>

    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="user" placeholder="seu usuário" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Entrar</button>

    <div class="error-msg" id="errMsg">Usuário ou senha incorretos.</div>
  </div>

  <div class="footer-note">v2.0 · QUANTIC PREMIUM © 2025</div>
</div>

<script>
  // Demo credentials — in production, replace with real API auth
  const USERS = {
    'admin': 'quantic2025',
    'revendedor': '1234'
  };

  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    const err = document.getElementById('errMsg');

    if (USERS[u] && USERS[u] === p) {
      sessionStorage.setItem('qp_user', u);
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
      document.getElementById('pass').value = '';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }
</script>
</body>
</html>
